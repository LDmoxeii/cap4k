name: Aliyun Snapshot Publish

on:
  push:
    branches:
      - publish/aliyun-private
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Preflight Aliyun publish credentials
        env:
          ALIYUN_MAVEN_USERNAME: ${{ secrets.ALIYUN_MAVEN_USERNAME }}
          ALIYUN_MAVEN_PASSWORD: ${{ secrets.ALIYUN_MAVEN_PASSWORD }}
        run: |
          test -n "$ALIYUN_MAVEN_USERNAME" || { echo "Missing secret: ALIYUN_MAVEN_USERNAME"; exit 1; }
          test -n "$ALIYUN_MAVEN_PASSWORD" || { echo "Missing secret: ALIYUN_MAVEN_PASSWORD"; exit 1; }

      - name: Publish
        env:
          ALIYUN_MAVEN_USERNAME: ${{ secrets.ALIYUN_MAVEN_USERNAME }}
          ALIYUN_MAVEN_PASSWORD: ${{ secrets.ALIYUN_MAVEN_PASSWORD }}
        run: ./gradlew publish
