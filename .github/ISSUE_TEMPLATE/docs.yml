name: Documentation
description: Request or propose a documentation-only change.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: page
    attributes:
      label: Page or file
      description: Link or path to the affected documentation.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
      description: What is missing, stale, unclear, or wrong?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed wording or direction
    validations:
      required: false
