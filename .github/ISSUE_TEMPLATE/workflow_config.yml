name: Workflow or repository config
description: Request a GitHub Actions, branch protection, or repository governance change.
title: "[Config]: "
labels:
  - ci
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which workflow, branch rule, template, or repository setting should change?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: What friction or risk does this change remove?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should we verify the setting behaves correctly?
    validations:
      required: true
